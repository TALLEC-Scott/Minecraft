<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="favicon.png?v=0.7.13">
    <title>Minecraft Clone — WebGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: #ccc;
            overflow: hidden;
        }
        #status {
            padding: 12px 20px 8px;
            font-size: 18px;
        }
        /* Rotating grass-block cube — pure CSS 3D, no assets required. */
        #cubeScene {
            width: 140px;
            height: 140px;
            perspective: 400px;
            margin: 20px auto 32px;  /* extra bottom clearance so the tilted cube doesn't overlap the text */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #cube {
            width: 96px; height: 96px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-25deg) rotateY(0deg);
        }
        #cube > div {
            position: absolute;
            width: 96px; height: 96px;
            border: 2px solid #1f2d0a;
            box-shadow: inset 0 0 18px rgba(0,0,0,0.35);
            image-rendering: pixelated;
        }
        /* Top = grass green, sides = dirt-with-grass-ring (gradient fake), bottom = dirt brown. */
        .face-top    { background: repeating-linear-gradient(45deg, #78a635, #78a635 6px, #699029 6px, #699029 12px); transform: rotateX( 90deg) translateZ(48px); }
        .face-bottom { background: repeating-linear-gradient(45deg, #7a5a32, #7a5a32 6px, #6a4c27 6px, #6a4c27 12px); transform: rotateX(-90deg) translateZ(48px); }
        .face-side   { background: linear-gradient(to bottom, #78a635 0%, #78a635 18%, #6a4c27 18%, #7a5a32 100%); }
        .face-front  { transform: translateZ(48px); }
        .face-back   { transform: rotateY(180deg) translateZ(48px); }
        .face-left   { transform: rotateY(-90deg) translateZ(48px); }
        .face-right  { transform: rotateY( 90deg) translateZ(48px); }
        #progressWrap {
            width: 320px;
            height: 16px;
            background: #2a2a2a;
            border: 2px solid #1a1a1a;
            box-shadow: inset 2px 2px 0 #000, inset -2px -2px 0 #3a3a3a;
            overflow: hidden;
            margin-top: 14px;
            image-rendering: pixelated;
        }
        #progressFill {
            height: 100%;
            width: 0%;
            /* Minecraft XP/loading-bar green — bright lime with a darker bottom stripe. */
            background: linear-gradient(to bottom,
                #a0e05a 0%, #a0e05a 45%,
                #5c9a1d 45%, #5c9a1d 100%);
            transition: width 0.15s ease-out;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        #info {
            position: fixed;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #5a5;
            pointer-events: none;
            text-shadow: 0 0 4px #000;
        }
    </style>
</head>
<body>
    <div id="cubeScene">
        <div id="cube">
            <div class="face-side face-front"></div>
            <div class="face-side face-back"></div>
            <div class="face-side face-left"></div>
            <div class="face-side face-right"></div>
            <div class="face-top"></div>
            <div class="face-bottom"></div>
        </div>
    </div>
    <div id="status"><span id="statusText">Loading game...</span></div>
    <div id="progressWrap"><div id="progressFill"></div></div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="info">Click to capture mouse — M pause — R sprint — Double-Space toggle fly — Shift descend</div>
    <script>
        var APP_VERSION = "0.7.13";
        var Module = {
            locateFile: function(path) { return path + '?v=' + APP_VERSION; },
            preRun: [function() {
                FS.mkdir('/saves');
                FS.mount(IDBFS, {}, '/saves');
                Module.addRunDependency('idbfs-sync');
                FS.syncfs(true, function(err) {
                    if (err) console.error('IDBFS load error:', err);
                    else console.log('IDBFS: loaded persistent storage');
                    Module.removeRunDependency('idbfs-sync');
                });
            }],
            canvas: (function() {
                var c = document.getElementById('canvas');
                c.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost!');
                    e.preventDefault();
                }, false);
                return c;
            })(),
            onRuntimeInitialized: function() {
                document.getElementById('cubeScene').style.display = 'none';
                document.getElementById('status').style.display = 'none';
                document.getElementById('progressWrap').style.display = 'none';
            },
            // Emscripten calls setStatus() with strings like
            // "Downloading data... (1234567/9876543)". Parse the bytes to
            // drive the progress bar; fall back to the status text when the
            // message doesn't carry a fraction.
            setStatus: function(text) {
                var statusEl = document.getElementById('statusText');
                var fill = document.getElementById('progressFill');
                if (!text) {
                    statusEl.textContent = 'Loading game...';
                    return;
                }
                var m = text.match(/\((\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)\)/);
                if (m) {
                    var pct = (parseFloat(m[1]) / parseFloat(m[2])) * 100;
                    fill.style.width = pct.toFixed(1) + '%';
                    statusEl.textContent = 'Loading game... ' + Math.floor(pct) + '%';
                    // Cube progress stored for the RAF loop; see below.
                    window.__loadingProgress = pct;
                } else {
                    statusEl.textContent = text;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                // Once network downloads are done, show an indeterminate
                // "preparing" state for any remaining preRun work (IDBFS).
                if (left === 0) {
                    document.getElementById('statusText').textContent = 'Starting...';
                    document.getElementById('progressFill').style.width = '100%';
                }
            },
            print: function(text) { console.log(text); },
            printErr: function(text) { console.warn(text); }
        };
    </script>
    <script>
        // Cube spin loop: base ~90 deg/sec, accelerates up to ~450 deg/sec at 100% progress
        // so the faster the download, the faster the cube visibly spins.
        (function() {
            var angle = 0;
            var last = performance.now();
            window.__loadingProgress = 0;
            function frame(now) {
                var dt = (now - last) / 1000;
                last = now;
                var pct = window.__loadingProgress || 0;
                var degPerSec = 90 + (pct / 100) * 360;
                angle = (angle + degPerSec * dt) % 360;
                var cube = document.getElementById('cube');
                if (cube) cube.style.transform = 'rotateX(-25deg) rotateY(' + angle.toFixed(2) + 'deg)';
                if (document.getElementById('cubeScene') &&
                    document.getElementById('cubeScene').style.display !== 'none') {
                    requestAnimationFrame(frame);
                }
            }
            requestAnimationFrame(frame);
        })();
    </script>
    {{{ SCRIPT }}}
</body>
</html>
